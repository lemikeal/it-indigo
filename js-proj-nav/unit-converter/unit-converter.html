<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="author" content="L. Mikeal" />
    <title>Unit Converter</title>
    <link rel="stylesheet" href="assets/style/unit-converter.css">
  </head>
  <body>
    <form id="myform" onsubmit="return false;">
      <div class="formcontainer">
        <h1>Unit Converter (AJAX)</h1>
        <fieldset>
          <legend>Unit Converter (AJAX)</legend>
          <br />

          <label class="formlabel" for="FromValue">From Value:</label>
          <input type="text" id="FromValue" name="FromValue" />
          <label for="FromValue" class="error" id="FromValueMsg"></label>
          <br /><br />

          <label class="form label">From Unit: </label>
          <label
            ><input type="radio" name="FromUnit" value="cm" />
            centimeters</label
          >
          <label><input type="radio" name="FromUnit" value="m" /> meters</label>
          <label
            ><input type="radio" name="FromUnit" value="km" /> kilometers</label
          >
          <label
            ><input type="radio" name="FromUnit" value="in" /> inches</label
          >
          <label><input type="radio" name="FromUnit" value="ft" /> feet</label>
          <label><input type="radio" name="FromUnit" value="yd" /> yards</label>
          <label><input type="radio" name="FromUnit" value="mi" /> miles</label>
          <label for="FromUnit" class="error" id="FromUnitMsg"></label>
          <br /><br />

          <label class="form label">To Unit: </label>
          <label
            ><input type="radio" name="ToUnit" value="cm" /> centimeters</label
          >
          <label><input type="radio" name="ToUnit" value="m" /> meters</label>
          <label
            ><input type="radio" name="ToUnit" value="km" /> kilometers</label
          >
          <label><input type="radio" name="ToUnit" value="in" /> inches</label>
          <label><input type="radio" name="ToUnit" value="ft" /> feet</label>
          <label><input type="radio" name="ToUnit" value="yd" /> yards</label>
          <label><input type="radio" name="ToUnit" value="mi" /> miles</label>
          <label for="ToUnit" class="error" id="ToUnitMsg"></label>
          <br /><br />

          <label class="formlabel" for="ToValue">To Value: </label>
          <span id="ToValue"></span>

          <br /><br />
          <input
            type="button"
            value="Calculate"
            id="Calculate"
            onclick="calculate()"
          />
          <input type="button" value="Clear" id="Clear" onclick="clearform()" />
        </fieldset>
      </div>
    </form>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/jquery.validation/1.19.5/jquery.validate.min.js"></script>
    <script src="https://cdn.jsdelivr.net/jquery.validation/1.19.5/additional-methods.min.js"></script>
    <script src="assets/script/unit-converter.js"></script>
  </body>
</html>
