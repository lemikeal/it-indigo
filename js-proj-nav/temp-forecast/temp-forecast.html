<html>
<head>
        <title>Temperature Forecast</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="author" content="L. Mikeal">
        <meta name="robots" content="noindex">
        <link href="assets/style/temp-forecast.css" rel="stylesheet">
    </head>
<body>
<main>
    <h2>Temperature Forecast</h2>
    <section>
        <div>
            <div>
                <label for="locationInput" class="formlabel">Enter City</label>
                <input type="text" id="locationInput" placeholder="e.g. Little Rock"">
                <span id="locError" class="error"></span>
            </div>
            <div class="calc-actions" style="margin-top: 20px;">
                <button type="button" onclick="getWeatherForecast()" class="btn-main">Get Forecast</button>
            </div>
        </div>
    </section>
    <section id="results-container">
        <div>
            <div>
                <h2>City Found</h2>
                <div id="location-info">
                    </div>
            </div>
            <aside>
                <h3>Coordinates</h3>
                <ul id="coord-list">
                    </ul>
            </aside>
        </div>
        <div class="chart-wrapper">
            <h3>7-Day Trend (°F)</h3>
            <canvas id="weatherChart"></canvas>
        </div>
        <div class="weather-table-container">
            <h3>Hourly Forecast</h3>
            <table id="forecastTable">
                <thead>
                    <tr>
                        <th>Date, Time</th>
                        <th>Temperature (°F)</th>
                    </tr>
                </thead>
                <tbody id="forecastBody"></tbody>
            </table>
        </div>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="assets/script/temp-forecast.js"></script>
</body>
</html>
